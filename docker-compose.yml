services:
  bot:
    build: .
    container_name: binance-futures-bot
    restart: unless-stopped
    # Expose REST API for host access
    ports:
      - "8765:8765"
    volumes:
      - ./.env:/app/.env:ro
      - ./.env.live:/app/.env.live:ro
      - ./.bot_state:/app/.bot_state
      - ./logs:/app/logs
    environment:
      TZ: Asia/Ho_Chi_Minh
      API_HOST: 0.0.0.0
      ENABLE_API_MUTATIONS: 'false'
    command: ["python", "main.py", "--verbose"]
