version: '3.8'

services:
  bot:
    build: .
    container_name: binance-futures-bot
    restart: unless-stopped
    # No host port is published. API binds to container loopback by default.
    # Put an authenticated reverse proxy/VPN in front only if remote control is required.
    volumes:
      - ./.env:/app/.env:ro
      - ./.env.live:/app/.env.live:ro
      - ./.bot_state:/app/.bot_state
      - ./logs:/app/logs
    environment:
      TZ: Asia/Ho_Chi_Minh
      API_HOST: 127.0.0.1
      ENABLE_API_MUTATIONS: 'false'
    command: ["python", "main.py", "--verbose"]
